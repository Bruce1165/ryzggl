<body lang=ZH-CN style='text-justify-trim:punctuation'>

<div class=WordSection1 style='layout-grid:15.6pt'>

<p class=MsoNormal><span style='font-family:宋体'>依次点击：培训点业务》准考证管理，进入管理页面，如图</span></p>

<p class=MsoNormal><span lang=EN-US><img width=811 height=194 id="图片 2"
src="执业技能准考证管理.files/image001.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>选择一个考试计划</span></p>

<p class=MsoNormal><span lang=EN-US><img width=797 height=350 id="图片 1"
src="执业技能准考证管理.files/image002.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>点击批量分配考场可以批量设置考场（平均分配人数）、然后在修改个别考场。</span></p>

<p class=MsoNormal><span lang=EN-US><img width=816 height=265 id="图片 3"
src="执业技能准考证管理.files/image003.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>这里可以点击批量分配考场连接进行批量分配或点击添加考场进行逐个添加。</span></p>

<p class=MsoNormal><span lang=EN-US><img width=808 height=400 id="图片 4"
src="执业技能准考证管理.files/image004.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>录入使用考场数量、容纳总人数、起始考场号、考试时间，点击分配考场按钮进行分配考场，</span></p>

<p class=MsoNormal><span style='font-family:宋体'>或点击追加考场进行补充考场。</span></p>

<p class=MsoNormal><span lang=EN-US><img width=793 height=257 id="图片 5"
src="执业技能准考证管理.files/image005.jpg"></span></p>

<p class=MsoNormal><span style='font-family:宋体'>可编辑或删除已分配的考场。</span></p>

<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>

<p class=MsoNormal><span style='font-family:宋体'>点击准考证放号按钮，可以进行准考证放号。</span></p>

<p class=MsoNormal><span style='font-family:宋体'>点击取消准考证放号，可取消放号，对考场重新分配后再次放号。</span></p>

<p class=MsoNormal><span style='font-family:宋体'>放号后个人登录建委系统可下载准考证。</span></p>

<p class=MsoNormal><span lang=EN-US><img width=799 height=227 id="图片 6"
src="执业技能准考证管理.files/image006.jpg"></span></p>

</div>
