<body lang=ZH-CN style='text-justify-trim:punctuation'>

<div class=WordSection1 style='layout-grid:15.6pt'>

<p class=MsoNormal><span style='font-family:宋体'>进入考试成绩录入页面</span></p>

<p class=MsoNormal><span lang=EN-US><img width=850 height=361 id="图片 1"
src="职业技能考试成绩录入.files/image001.jpg"></span></p>

<p class=MsoListParagraph style='margin-left:18.0pt;text-indent:-18.0pt'><span
lang=EN-US>1、<span style='font:7.0pt "Times New Roman"'>&nbsp; </span></span><span
style='font-family:宋体'>选择一个考试计划，列表显示该考试计划所有分配准考证的考生信息。</span></p>

<p class=MsoListParagraph style='margin-left:18.0pt;text-indent:-18.0pt'><span
lang=EN-US>2、<span style='font:7.0pt "Times New Roman"'>&nbsp; </span></span><span
style='font-family:宋体'>点击下载成绩导入模板，下载带有考生信息的成绩导入模板。（理论和实操考试使同一个一个模板，但成绩分两个文件保存）录入成绩保存待用。</span></p>

<p class=MsoListParagraph style='margin-left:18.0pt;text-indent:-18.0pt'><span
lang=EN-US>3、<span style='font:7.0pt "Times New Roman"'>&nbsp; </span></span><span
style='font-family:宋体'>选择考试科目（理论或实操），分两次导入成绩。</span></p>

<p class=MsoListParagraph style='margin-left:18.0pt;text-indent:-18.0pt'><span
lang=EN-US>4、<span style='font:7.0pt "Times New Roman"'>&nbsp; </span></span><span
style='font-family:宋体'>选择已经录好成绩的文件。</span></p>

<p class=MsoListParagraph style='margin-left:18.0pt;text-indent:-18.0pt'><span
lang=EN-US>5、<span style='font:7.0pt "Times New Roman"'>&nbsp; </span></span><span
style='font-family:宋体'>点击导入成绩录入到系统中。</span></p>

<p class=MsoListParagraph style='margin-left:18.0pt;text-indent:0cm'><span
lang=EN-US><img width=835 height=323 id="图片 2"
src="职业技能考试成绩录入.files/image002.jpg"></span></p>

<span lang=EN-US style='font-size:10.5pt;font-family:"Calibri","sans-serif"'><br
clear=all style='page-break-before:always'>
</span>

<p class=MsoNormal align=left style='text-align:left'><span style='font-family:
宋体'>注意：如果没有主观题，可录入</span><span lang=EN-US>0</span><span style='font-family:
宋体'>分。</span></p>

<p class=MsoNormal align=left style='text-align:left'><span lang=EN-US>&nbsp;</span></p>

<p class=MsoNormal><span style='font-family:宋体'>成绩录入完毕后市住建委注册中心业务人员负责约定的参数设置合格线，公告成绩，发放电子证书。</span></p>

<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>

<p class=MsoNormal><span style='font-family:宋体'>培训点可在证书查页面查询市住建委已经放号的电子证书信息</span></p>

<p class=MsoNormal><span lang=EN-US><img width=843 height=366 id="图片 3"
src="职业技能考试成绩录入.files/image003.jpg"></span></p>
