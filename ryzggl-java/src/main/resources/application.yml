server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: ryzggl-java

  datasource:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    url: jdbc:sqlserver://101.200.193.13:1433;databaseName=RYZG;encrypt=false;trustServerCertificate=true
    username: synergydatauser
    password: synergy_p@ssword

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ryzggl.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT Configuration
jwt:
  secret: RYZGGL_JWT_SECRET_KEY_2024_SECURE_TOKEN_GENERATION
  expiration: 86400000  # 24 hours in milliseconds

# Knife4j Configuration
knife4j:
  enable: true
  setting:
    language: zh_cn

# Test Mode Configuration
test:
  mode: true

# File Upload Configuration
file:
  upload-path: ./uploads
  max-size: 10485760  # 10MB

logging:
  level:
    com.ryzggl: debug
    com.baomidou.mybatisplus: debug
